site_name: 'blitzy-card-demo'
nav:
  - Home: index.md
  - Project Guide: project-guide.md
  - Technical Specifications: technical-specifications.md
plugins:
  - techdocs-core:
      use_material_search: true
  - mermaid2
exclude_docs: |
  README.md
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
# ============================================================================
# CardDemo — Continuous Integration Pipeline
# ----------------------------------------------------------------------------
# Lints, type-checks, and tests the Python codebase on every push/pull
# request targeting the main branch. Replaces the z/OS build/deploy JCL.
#
# Per AAP §0.4.4 "CI pipeline: lint -> type-check -> unit tests ->
# integration tests".
# ============================================================================

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  # --------------------------------------------------------------------------
  # Lint & format check (ruff)
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

  # --------------------------------------------------------------------------
  # Static type checking (mypy)
  # --------------------------------------------------------------------------
  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy src

  # --------------------------------------------------------------------------
  # Unit + integration tests with PostgreSQL service container
  # --------------------------------------------------------------------------
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: carddemo_test
          POSTGRES_USER: carddemo
          POSTGRES_PASSWORD: carddemo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carddemo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://carddemo:carddemo@localhost:5432/carddemo_test
      DATABASE_URL_SYNC: postgresql+psycopg2://carddemo:carddemo@localhost:5432/carddemo_test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      JWT_SECRET_KEY: ci-test-secret-key
      JWT_ALGORITHM: HS256

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-glue.txt

      - name: Run tests with coverage
        run: |
          pytest -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # --------------------------------------------------------------------------
  # Docker build smoke-test for the API image
  # --------------------------------------------------------------------------
  docker-build:
    name: Docker build (API image)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: carddemo-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
